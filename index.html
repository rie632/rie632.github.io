<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的校园网站</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f0f9ff, #e6f7ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.15);
            text-align: center;
        }
        h1 {
            color: #0066cc;
            margin-bottom: 15px;
        }
        p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✅ 网站部署成功啦！</h1>
        <p>你的校园网站已经可以正常访问了！</p>
    </div>
</body>
</html>
